<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" width="820" height="320" fill="none">
  <title>TalimPlus</title>
  <defs>
    <linearGradient id="tGrad" x1="90" y1="150" x2="200" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f7bf6"/>
      <stop offset="1" stop-color="#1d5fe0"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="60" y1="70" x2="220" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b2f74"/>
      <stop offset="1" stop-color="#152560"/>
    </linearGradient>
    <linearGradient id="plusGrad" x1="150" y1="185" x2="215" y2="255" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2fd08a"/>
      <stop offset="1" stop-color="#17b978"/>
    </linearGradient>
    <linearGradient id="plusWord" x1="560" y1="120" x2="800" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#28c07f"/>
      <stop offset="1" stop-color="#1fae74"/>
    </linearGradient>
  </defs>

  <!-- ===== Icon ===== -->
  <g>
    <!-- Letter T (blue) -->
    <path d="M92 150 h108 a10 10 0 0 1 10 10 v14 a10 10 0 0 1 -10 10 h-38 v74 a10 10 0 0 1 -10 10 h-16 a10 10 0 0 1 -10 -10 v-74 h-34 a10 10 0 0 1 -10 -10 v-14 a10 10 0 0 1 10 -10 z" fill="url(#tGrad)"/>

    <!-- Plus sign (green) -->
    <path d="M176 196 h14 a8 8 0 0 1 8 8 v14 h14 a8 8 0 0 1 8 8 v14 a8 8 0 0 1 -8 8 h-14 v14 a8 8 0 0 1 -8 8 h-14 a8 8 0 0 1 -8 -8 v-14 h-14 a8 8 0 0 1 -8 -8 v-14 a8 8 0 0 1 8 -8 h14 v-14 a8 8 0 0 1 8 -8 z" fill="url(#plusGrad)"/>

    <!-- Graduation cap board (mortarboard) -->
    <path d="M143 66 226 112 143 158 60 112 Z" fill="url(#capGrad)"/>
    <!-- Cap underside / band -->
    <path d="M104 133 143 154 182 133 v20 a39 12 0 0 1 -78 0 Z" fill="#152560"/>
    <!-- Tassel -->
    <path d="M60 112 v40" stroke="#152560" stroke-width="5" stroke-linecap="round"/>
    <circle cx="60" cy="160" r="8" fill="#152560"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <g font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="120" letter-spacing="-3">
    <text x="270" y="205"><tspan fill="#101c3a">Talim</tspan><tspan fill="url(#plusWord)">Plus</tspan></text>
  </g>
</svg>
